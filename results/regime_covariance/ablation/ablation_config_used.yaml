base_config: regime_covariance.yaml
mode: one_at_a_time
overrides:
  data:
    start_date: '2015-01-01'
    end_date: '2021-12-31'
  backtest:
    stride: 5
    refit_mode: days
    refit_every_days: 20
axes:
  embedder:
    key: embedder.name
    choices:
    - pca
    - corr_eig
  transition_estimator:
    key: model.transition_estimator
    choices:
    - hard
    - soft
  knn_metric:
    key: model.knn_metric
    choices:
    - l2
    - l1
    - cosine
    - angular
    - chebyshev
    - label: lp_p1
      model.knn_metric: lp
      model.knn_lp_p: 1
    - label: lp_p2
      model.knn_metric: lp
      model.knn_lp_p: 2
    - label: lp_p3
      model.knn_metric: lp
      model.knn_lp_p: 3
    - label: lp_p4
      model.knn_metric: lp
      model.knn_lp_p: 4
  regime_aggregation:
    key: model.regime_aggregation
    choices:
    - soft
    - hard
  regime_weighting:
    key: model.regime_weighting
    choices:
    - filtered
    - raw_pi
outputs:
  outdir: results/regime_covariance/ablation
