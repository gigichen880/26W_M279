# =============================================================================
# Phase 1 — Covariance marginals (one axis at a time)
# =============================================================================
# Combines the old split configs in one place (K-regime ablation is separate):
#   - Design: embedder.name, transition_estimator, knn_metric, regime_aggregation,
#             regime_weighting  (was ablation_covariance.yaml)
#   - Regime clustering backends  (was ablation_regime_clustering.yaml)
#   - PCA width D  (subset of ablation_pca_k — extend choices if needed)
#   - kNN neighbor count  (subset of ablation_k_neighbors_covariance.yaml)
#   - Kernel temperature τ  (marginal; joint τ×k is Phase 0 / ablation_joint_gmvp_grid.yaml)
#
# mode: one_at_a_time → total runs = sum of len(choices) per axis (not product).
#
# Run:
#   python -m scripts.analysis.ablation.run_ablation --config configs/ablation_phase1_covariance.yaml --plots summary
# Or:
#   python -m scripts.analysis.ablation.run_phased_covariance_ablation --phase 1
# Figures (default with phased runner): <outputs.outdir>/figs/axis_<axis>_model_only.png,
#   axis_pairwise_bars_<axis>.png, ablation_summary.png — co-located with ablation_summary.csv.
#
# After Phase 1, edit SHORTLIST_* in configs/ablation_phase2_joint_shortlist.yaml, then run Phase 2.
# =============================================================================

base_config: "regime_covariance.yaml"

mode: one_at_a_time

overrides:
  data:
    start_date: "2015-01-01"
    end_date: "2021-12-31"
  backtest:
    stride: 5
    refit_mode: "days"
    refit_every_days: 20

