# Visualization for volatility backtest (regime_volatility_backtest.csv).
# Same script as viz_regime_covariance; error and cumulative-advantage use vol_mse.

inputs:
  csv: "results/regime_volatility/backtest.csv"

outputs:
  outdir: "results/regime_volatility/figs/raw_temporal"
  prefix: ""

plot:
  roll_window: 21
  winroll_window: 63
  methods: ["model", "mix", "roll", "shrink", "pers"]
  reference_methods: ["model", "mix"]
  overlay_metrics:
    - vol_mse
    - vol_mae
    - vol_rmse
    - vol_qlike
    - vol_r2
  error_metric: "vol_mse"
  cumulative_advantage_metric: "vol_mse"
  heavy_pos_metrics: []
  higher_is_better: []
  calibration: false
