data:
  parquet_path: "data/processed/returns_universe_100.parquet"
  policy: "drop_date"
  q99_thresh: 0.5
  max_thresh: 1.0
  min_non_nan_frac: 0.2
  start_date: "2007-07-01"
  end_date: "2021-12-31"

model:
  target: "covariance" # "covariance" | "volatility" | "precision" (forecast Sigma^{-1}; can improve GMVP)
  lookback: 50
  horizon: 20

  # regimes + filtering
  n_regimes: 4
  tau: 2.0
  random_state: 0
  transition_estimator: "soft" # "hard" or "soft"
  trans_smooth: 10.0
  gmm_init_params: "random"
  gmm_n_init: 10

  # Regime assignment on embeddings (Stage 2). Omit or omit `name` to use GMM with gmm_init_params / gmm_n_init above.
  # n_regimes and random_state always come from this `model:` block (not inside regime_clustering).

  regime_clustering:
    name: fuzzy_cmeans # needs: pip install scikit-fuzzy
    params:
      fuzziness: 2.0 # m in fuzzy c-means (default 2)
      max_iter: 300
      error: 1.0e-5 # convergence tolerance (skfuzzy `error`)
      eps: 1.0e-12 # row-normalization floor for PI

  # Other runnable names + useful params (all under params:):
  #   gmm — covariance_type, reg_covar, max_iter, tol, gmm_init_params, gmm_n_init, eps
  #   kmeans_soft — n_init, max_iter, temperature, eps
  #   spectral_rbf — gamma (optional), temperature, eps
  #   spectral_knn — n_neighbors, temperature, eps
  #   agglomerative_ward — linkage, temperature, eps
  #   modified_two_stage — outlier_quantile, n_init, temperature, eps
  #   signed_knn_spectral — n_neighbors, temperature, eps
  #
  # Slide-only (need extra inputs): hermitian_spectral, disg_co_clustering, dsbm → clear error if selected.

  # target object
  ddof: 1

  # stage-1/2/3 training sampling stride (controls how many anchor windows are used for fit())
  sample_stride: 3

  # KNN in embedding space: l1, l2, lp (set knn_lp_p), chebyshev, cosine, angular
  knn_metric: "lp"
  knn_lp_p: 1.0

  # Pipeline stability: lower GMVP variance with minimal Sharpe drop. No blend with roll/shrink (see docs/MODEL_VS_MIX_DESIGN.md).
  output_shrink_toward_diag: 0.12 # reduced from 0.18 so model is more distinct from shrink → better model vs shrink
  alpha_smooth_frac: 0.08 # smooth regime alpha to reduce variance spikes

embedder:
  name: "pca" # "pca" or "corr_eig"

  # PCA embedder params
  pca_k: 48

  # Corr-eig embedder params
  k_eigs: 32

  # window validation inside embedder (for building training windows)
  max_window_na_pct: 0.3
  min_stocks_with_data_pct: 0.8
  verbose_skip: false

aggregator:
  name: "logeuc" # "logeuc" or "arith"
  eps_spd: 1.0e-8

backtest:
  k_neighbors: 30
  stride: 5 # evaluation stride in raw_anchor units
  neighbor_gap: 10 # disallow near-duplicate neighbors

  long_only: false
  verbose: true

  # refit control
  refit_mode: "days" # "days" or "steps"
  refit_every_days: 20 # used when refit_mode="days"
  refit_every_steps: 20 # used when refit_mode="steps"

validation:
  # validation of FUTURE window (evaluation hold-out)
  fut_max_na_pct: 0.3
  fut_min_stocks_pct: 0.8

internals:
  burn_in: 252
  min_samples_for_gmm: 50

guardrail:
  trace_ratio_lo: 0.5 # relaxed so model is used more often (was 0.6) → better model vs shrink on GMVP
  trace_ratio_hi: 2.5 # relaxed (was 2.0)
  mode: "invalid_only" # "invalid_only" (recommended) | "ratio_or_invalid"

mixing:
  # Mixing for the "mix" method (covariance). Slightly more shrink → lower variance, small Sharpe cost.
  # cov_mix_weights:
  #   shrink: 0.55
  #   pers: 0.2
  #   model: 0.25
  mix_lambda: 0.3 # legacy: S_mix = (1-lam) S_shrink + lam S_model (used only if cov_mix_weights omitted)
  shrink_gamma: 0.3 # baseline_shrink_to_diag gamma

stability:
  floor_eps: 1.5e-3 # slightly higher → more stable GMVP weights, lower realized variance
  apply_floor_to: "gmvp_only"
  model_blend_to_pers_strength: 0.35 # uncertainty-aware fallback: blend model toward pers when regime confidence is low
  model_blend_to_pers_conf_threshold: 0.75 # only blend when confidence is below this
  model_blend_to_pers_power: 2.0 # sharper: high-confidence days are ~pure model

outputs:
  outdir: "results"
  tag: "regime_covariance"
