# Ablation over design choices for covariance forecasting.
# One-at-a-time: for each axis, each choice is run; others at base config values.

base_config: "regime_covariance.yaml"

mode: one_at_a_time

# Optional: override pieces of the base config for faster sweeps.
# This does NOT modify the base YAML on disk; it only changes the in-memory config used for ablation runs.
overrides:
  data:
    # Shorter window so ablation is cheaper; adjust as needed
    start_date: "2015-01-01"
    end_date: "2021-12-31"
  backtest:
    # Fewer evaluation points (bigger stride) and less frequent refits speeds things up a lot
    stride: 5
    refit_mode: "days"
    refit_every_days: 20

# In grid mode, we sort by this column (must exist in the summary table)
# objective: model_gmvp_sharpe_mean

axes:
  embedder:
    key: embedder.name
    choices: [pca, corr_eig]
  transition_estimator:
    key: model.transition_estimator
    choices: [hard, soft]
  # Neighbor distance: scalars set model.knn_metric; dict entries set metric + knn_lp_p (see run_ablation.py).
  # lp_p1 / lp_p2 overlap l1 / l2 but keep explicit Lp runs. Consider ablating model.tau when comparing metrics.
  knn_metric:
    key: model.knn_metric
    choices:
      - l2
      - l1
      - cosine
      - angular
      - chebyshev
      - label: lp_p1
        model.knn_metric: lp
        model.knn_lp_p: 1
      - label: lp_p2
        model.knn_metric: lp
        model.knn_lp_p: 2
      - label: lp_p3
        model.knn_metric: lp
        model.knn_lp_p: 3
      - label: lp_p4
        model.knn_metric: lp
        model.knn_lp_p: 4
  regime_aggregation:
    key: model.regime_aggregation
    choices: [soft, hard]
  regime_weighting:
    key: model.regime_weighting
    choices: [filtered, raw_pi]

outputs:
  outdir: "results/regime_covariance/ablation"
