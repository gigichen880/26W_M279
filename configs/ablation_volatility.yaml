# Ablation over design choices for realized-volatility forecasting.
# One-at-a-time: for each axis, each choice is run; others at base config values.

base_config: "regime_volatility.yaml"

mode: one_at_a_time

axes:
  embedder:
    key: embedder.name
    choices: [pca, corr_eig, vol_stats]
  transition_estimator:
    key: model.transition_estimator
    choices: [hard, soft]
  knn_metric:
    key: model.knn_metric
    choices:
      - l2
      - l1
      - cosine
      - angular
      - chebyshev
      - label: lp_p1
        model.knn_metric: lp
        model.knn_lp_p: 1
      - label: lp_p2
        model.knn_metric: lp
        model.knn_lp_p: 2
      - label: lp_p3
        model.knn_metric: lp
        model.knn_lp_p: 3
      - label: lp_p4
        model.knn_metric: lp
        model.knn_lp_p: 4
  regime_aggregation:
    key: model.regime_aggregation
    choices: [soft, hard]
  regime_weighting:
    key: model.regime_weighting
    choices: [filtered, raw_pi]

outputs:
  outdir: "results/regime_volatility/ablation"
